services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: aura-postgres
    restart: always
    environment:
      POSTGRES_DB: aura_archive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-aura_secret_2024}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # PRODUCTION SERVICES
  # ============================================

  # Node.js API Server (Production)
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: aura-server
    restart: always
    expose:
      - "5000"
    volumes:
      - server_uploads:/app/uploads
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: aura_archive
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-aura_secret_2024}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-2024}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_LIVE_MODEL: ${GEMINI_LIVE_MODEL:-gemini-2.5-flash-native-audio-preview-12-2025}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CHATBOT_MODE: ${CHATBOT_MODE:-auto}
    depends_on:
      postgres:
        condition: service_healthy


  # Nuxt.js Client (Production)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_API_URL: /api/v1
    container_name: aura-client
    restart: always
    expose:
      - "3000"
    environment:
      NUXT_PUBLIC_API_URL: /api/v1
    depends_on:
      - server

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: aura-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - client
      - server

  # ============================================
  # DEVELOPMENT SERVICES (Hot Reload)
  # ============================================

  # Node.js API Server (Development)
  server-dev:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: aura-server-dev
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: aura_archive
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-aura_secret_2024}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-2024}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_LIVE_MODEL: ${GEMINI_LIVE_MODEL:-gemini-2.5-flash-native-audio-preview-12-2025}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CHATBOT_MODE: ${CHATBOT_MODE:-auto}
    depends_on:
      postgres:
        condition: service_healthy


  # Nuxt.js Client (Development)
  client-dev:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: aura-client-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.nuxt
    environment:
      NUXT_PUBLIC_API_URL: /api/v1
      NUXT_PROXY_API_URL: http://server-dev:5000
      NODE_ENV: development
      DOCKER: "true"
    depends_on:
      - server-dev

# Data persistence
volumes:
  postgres_data:
    driver: local
  server_uploads:
    driver: local
